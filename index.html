<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>မြန်မာနိုင်ငံ လမ်းကြောင်းမှတ် App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* ဖုန်းမျက်နှာပြင်အပြည့် ပြသရန် UI Styles */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Pyidaungsu', Arial, sans-serif;
            background-color: #f4f6f9;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: calc(100% - 140px); /* မြေပုံဧရိယာ */
        }
        .control-panel {
            height: 140px;
            background: #ffffff;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.15);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            position: relative;
            z-index: 1000;
        }
        .status-text {
            font-size: 14px;
            font-weight: bold;
            color: #495057;
            text-align: center;
            margin-bottom: 5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        button {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .start-btn { background-color: #28a745; color: white; }
        .start-btn:active { background-color: #218838; }
        
        .stop-btn { background-color: #dc3545; color: white; }
        .stop-btn:active { background-color: #c82333; }
        
        .clear-btn { background-color: #6c757d; color: white; }
        .clear-btn:active { background-color: #5a6268; }
        
        button:disabled {
            background-color: #e9ecef !important;
            color: #adb5bd !important;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <div class="status-text" id="statusMessage">အခြေအနေ: စောင့်ဆိုင်းဆဲ (မြန်မာနိုင်ငံမြေပုံ)</div>
        <div class="btn-group">
            <button class="start-btn" id="startBtn">စမှတ်မည်</button>
            <button class="stop-btn" id="stopBtn" disabled>ရပ်မည်</button>
            <button class="clear-btn" id="clearBtn">ဖျက်မည်</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let watchId = null;
        let pathCoordinates = JSON.parse(localStorage.getItem('mmTrackedPath')) || [];
        let polyline = null;
        let currentMarker = null;

        // မြေပုံ စတင်ဖွင့်လှစ်ခြင်း
        function initMap() {
            // မြန်မာနိုင်ငံအလယ်ပိုင်း (မန္တလေးတစ်ဝိုက်) ကို ဗဟိုပြု၍ မြေပုံစဖွင့်မည်
            map = L.map('map').setView([21.9162, 95.9560], 6);

            // OpenStreetMap မြေပုံစနစ်ကို အသုံးပြုခြင်း
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // ဖုန်းထဲမှာ ယခင်မှတ်ထားဖူးသော လမ်းကြောင်းရှိပါက မြေပုံပေါ်တွင် ပြန်ဆွဲပေးခြင်း
            if (pathCoordinates.length > 0) {
                polyline = L.polyline(pathCoordinates, { color: '#007bff', weight: 6, opacity: 0.8 }).addTo(map);
                map.fitBounds(polyline.getBounds());
                document.getElementById('statusMessage').innerText = "အခြေအနေ: ယခင်မှတ်ထားသော လမ်းကြောင်းပြနေပါသည်";
            }

            // အကယ်၍ ဖုန်း GPS ပွင့်နေပါက လက်ရှိနေရာကို ရှာပြီး မြေပုံအလယ်သို့ ပို့ပေးခြင်း
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    map.setView([lat, lng], 15);
                    currentMarker = L.marker([lat, lng]).addTo(map).bindPopup("သင်လက်ရှိရောက်နေသောနေရာ").openPopup();
                }, () => {
                    console.log("GPS ရှာမတွေ့သဖြင့် မူရင်း မြန်မာနိုင်ငံမြေပုံအတိုင်း ပြထားပါသည်။");
                });
            }
        }

        // လမ်းကြောင်းစတင်မှတ်သားခြင်း
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("သင့်ဖုန်းက Location စနစ်ကို အထောက်အပံ့မပေးပါ သို့မဟုတ် ပိတ်ထားပါသည်။");
                return;
            }

            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('statusMessage').innerText = "အခြေအနေ: လမ်းကြောင်းကို စတင်မှတ်သားနေပါပြီ...";
            document.getElementById('statusMessage').style.color = "#28a745";

            // ဖုန်းရွှေ့လျားမှုအလိုက် တည်နေရာကို စက္ကန့်မလပ် ဖတ်မည့်စနစ်
            watchId = navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const currentPos = [lat, lng];

                // တည်နေရာအသစ်ကို သိမ်းဆည်းခြင်း
                pathCoordinates.push(currentPos);
                localStorage.setItem('mmTrackedPath', JSON.stringify(pathCoordinates));

                // မြေပုံပေါ်တွင် လမ်းကြောင်းမျဉ်းဆွဲခြင်း
                if (!polyline) {
                    polyline = L.polyline(pathCoordinates, { color: '#007bff', weight: 6, opacity: 0.8 }).addTo(map);
                } else {
                    polyline.setLatLngs(pathCoordinates);
                }

                // လက်ရှိလူရှိသောနေရာ Marker အား ရွှေ့ပေးခြင်း
                if (currentMarker) {
                    currentMarker.setLatLng(currentPos);
                } else {
                    currentMarker = L.marker(currentPos).addTo(map);
                }
                map.setView(currentPos, 16);

            }, error => {
                console.error(error);
                alert("Location ဖတ်မရပါ။ ဖုန်း၏ GPS လွှင့်ထားပေးရန် လိုအပ်ပါသည်။");
            }, {
                enableHighAccuracy: true, // GPS စနစ်ကို အကောင်းဆုံးတိကျမှုဖြင့် ဖတ်ရန်
                maximumAge: 0,
                timeout: 10000
            });
        });

        // လမ်းကြောင်းမှတ်သားမှု ရပ်တန့်ခြင်း
        document.getElementById('stopBtn').addEventListener('click', () => {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusMessage').innerText = "အခြေအနေ: လမ်းကြောင်းမှတ်သားမှုကို ရပ်ထားသည်";
            document.getElementById('statusMessage').style.color = "#dc3545";
        });

        // လမ်းကြောင်းမှတ်တမ်းဟောင်းများ အားလုံးဖျက်ပစ်ခြင်း
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm("မှတ်ထားသော လမ်းကြောင်းမှတ်တမ်းအားလုံးကို ဖျက်ပစ်ရန် သေချာပါသလား?")) {
                localStorage.removeItem('mmTrackedPath');
                pathCoordinates = [];
                if (polyline) {
                    map.removeLayer(polyline);
                    polyline = null;
                }
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('statusMessage').innerText = "အခြေအနေ: မှတ်တမ်းများအားလုံး ဖျက်ပြီးပါပြီ";
                document.getElementById('statusMessage').style.color = "#6c757d";
                map.setView([21.9162, 95.9560], 6); // မူရင်း မြန်မာနိုင်ငံမြေပုံသို့ ပြန်ရွှေ့မည်
            }
        });

        // App ပွင့်လာလျှင် မြေပုံကို အလိုအလျောက် စတင်ပတ်မည့်စနစ်
        window.onload = initMap;
    </script>
</body>
</html>
